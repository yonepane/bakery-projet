<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BakeryOS - Luxury Management</title>
    <meta name="description" content="Premium bakery management system with glassmorphic design. Track inventory, sales, and analytics in real-time." />

    <!--
      PERF: Step 1 — DNS/TLS warm-up for Google Fonts origins.
      These fire before the browser even starts parsing the font URL,
      saving ~200 ms on cold connections.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      PERF: Step 2 — Load Google Fonts asynchronously (non-render-blocking).
      media="print" makes the browser download but not apply the stylesheet;
      onload swaps it to "all" once ready. The <noscript> fallback keeps it
      working in environments where JS is disabled.
      &display=swap ensures text is visible immediately using fallback fonts —
      this directly fixes the "font-display" LCP delay.
    -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!--
      PERF: Step 3 — Inline only the critical above-the-fold CSS needed to
      render the login screen without a flash of unstyled content (FOUC).
      This eliminates the render-blocking /assets/index-*.css request for
      the initial paint. The rest of the styles are injected by Vite's JS bundle.
    -->
    <style>
      /* Critical: body reset so background is correct before JS loads */
      *,::before,::after{box-sizing:border-box}
      html{line-height:1.5;-webkit-text-size-adjust:100%}
      body{
        margin:0;
        min-height:100vh;
        background-color:#030712;
        color:#f1f5f9;
        font-family:'Plus Jakarta Sans',sans-serif;
        -webkit-font-smoothing:antialiased;
      }
      /* Prevent layout shift while fonts load */
      h1,h2,h3,h4,h5,h6,p,span,button,input{font-family:inherit}
      /* Critical login shell background — prevents white flash */
      .login-shell{
        position:relative;overflow:hidden;
        background:
          radial-gradient(circle at top,rgba(212,175,55,.06),transparent 22%),
          radial-gradient(circle at bottom right,rgba(245,199,94,.035),transparent 18%),
          linear-gradient(145deg,#000 0%,#010101 42%,#050403 100%);
      }
      /* Reserve space for the login badge image — prevents layout shift (CLS) */
      .login-badge{
        display:flex;align-items:center;justify-content:center;
        width:80px;height:80px;border-radius:2rem;overflow:hidden;
        margin:0 auto 1.5rem;
      }
      .login-badge img{width:100%;height:100%;object-fit:cover}
      /* Loading spinner shown before React mounts */
      #root:empty::after{
        content:'';display:block;
        width:40px;height:40px;margin:45vh auto 0;
        border:3px solid rgba(212,175,55,.2);
        border-top-color:#d4af37;
        border-radius:50%;
        animation:_spin .8s linear infinite;
      }
      @keyframes _spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body class="bg-[#030712] text-slate-100 font-sans">
    <!-- React mounts the full single-page application into this root node. -->
    <div id="root"></div>
    <!--
      PERF: The module script is deferred by the browser by default (spec),
      so it never blocks HTML parsing. Keeping it at the bottom of body is an
      extra safety net and matches standard React+Vite convention.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
