services:
  postgres:
    # Lightweight local PostgreSQL service for testing the hosted-database path
    # without needing a real cloud instance.
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bakeryos
      POSTGRES_USER: bakeryos
      POSTGRES_PASSWORD: bakeryos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  # Persist database data across container restarts.
  postgres_data:
